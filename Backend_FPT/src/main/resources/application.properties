spring.application.name=demoSpring
spring.profiles.include=local

# =========================================================
# 1. DATABASE CONFIGURATION (MYSQL)
# =========================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/coche_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# 2. SERVER & SECURITY (JWT)
# =========================================================
server.port=${PORT:8081}
server.tomcat.max-http-form-post-size=20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
jwt.secret=${JWT_SECRET:default_insecure_key_for_dev_only}
jwt.expiration=3600000

# =========================================================
# 3. GMAIL SMTP
# =========================================================
email.address=${EMAIL_ADDRESS:dummy@example.com}
email.password=${EMAIL_PASSWORD:dummy_password}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${email.address}
spring.mail.password=${email.password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================================================
# 4. GOOGLE OAUTH
# =========================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# =========================================================
# 5. FACEBOOK OAUTH
# =========================================================
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:YOUR_FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:YOUR_FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.scope=public_profile

# =========================================================
# 6. FIREBASE AUTHENTICATION
# =========================================================
firebase.api_key=${FIREBASE_API_KEY:YOUR_FIREBASE_API_KEY}

# =========================================================
# 7. GOOGLE GEMINI API
# =========================================================
gemini.api_key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}