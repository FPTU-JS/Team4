spring.application.name=demoSpring

# Database configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/demospring_db?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configuration (Update schema automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.data.source.url=jdbc:mysql://localhost:3306/demoSpring?useSSL=false&serverTimezone=UTC
spring.data.source.username=root
spring.data.source.password=


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

jwt.secret=your_jwt_secret_key
jwt.expiration=3600000

sever.port=8080